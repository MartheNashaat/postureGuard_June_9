name: postureguard
description: Real-time smartphone posture monitor using front camera and Google ML Kit.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  wakelock_plus: ^1.1.4
  sensors_plus: ^5.0.1
  permission_handler: ^11.3.1
  flutter_background_service: ^5.0.0
  flutter_local_notifications: ^17.0.0 # Or latest version
  google_mlkit_pose_detection: ^0.14.1
  camera: ^0.12.0+1
  flutter_tts: ^4.0.2
  vibration: ^3.1.8
  fl_chart: ^1.2.0
  sqflite: ^2.3.2
  path: ^1.9.0
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
